name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.4"
          elixir-version: "1.19.0"
          version-type: strict

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Validate repo
        run: ./scripts/validate-repo.sh

  release-validation:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24.8.0"

      - name: Install release tooling
        run: npm ci --ignore-scripts

      - name: Validate semantic-release dry run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:dry-run
